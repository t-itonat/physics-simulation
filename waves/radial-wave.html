<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>円形波シミュレーション</title>
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    canvas {
      border: 1px solid #444;
    }
  </style>
</head>
<body>
  <canvas id="canvas" width="500" height="500"></canvas>
  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const w = canvas.width;
    const h = canvas.height;

    const cx = w / 2;
    const cy = h / 2;

    const img = ctx.createImageData(w, h);

    const k = 0.08;      // 波数（波の細かさ）
    const omega = 0.08;  // 角速度（進む速さ）

    let t = 0;

    function draw() {
      const data = img.data;

      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const dx = x - cx;
          const dy = y - cy;
          const r = Math.sqrt(dx * dx + dy * dy);

          const z = Math.sin(k * r - omega * t); // -1〜1

          const brightness = (z + 1) * 0.5 * 255; // 0〜255 に変換

          const index = (y * w + x) * 4;
          data[index] = brightness;     // R
          data[index + 1] = brightness; // G
          data[index + 2] = 255;        // B（青っぽく）
          data[index + 3] = 255;        // A
        }
      }

      ctx.putImageData(img, 0, 0);
      t += 1;
      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>
</html>
