<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>立体的な円形波（超コントラスト）</title>
<style>
  body {
    margin: 0;
    background: #fff;
    overflow: hidden;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const k = 0.04;
const omega = 0.06;
let t = 0;

// 光の方向（右上から）
const light = { x: 0.5, y: -0.3, z: 1 };

function height(x, y, cx, cy, t) {
  const dx = x - cx;
  const dy = y - cy;
  const r = Math.sqrt(dx*dx + dy*dy);
  return Math.sin(k * r - omega * t);
}

function draw() {
  const w = canvas.width;
  const h = canvas.height;
  const cx = w / 2;
  const cy = h / 2 + 80;

  const img = ctx.createImageData(w, h);
  const data = img.data;

  for (let y = 1; y < h - 1; y++) {
    for (let x = 1; x < w - 1; x++) {

      const z = height(x, y, cx, cy, t);

      const dzdx = height(x+1, y, cx, cy, t) - height(x-1, y, cx, cy, t);
      const dzdy = height(x, y+1, cx, cy, t) - height(x, y-1, cx, cy, t);

      const nx = -dzdx;
      const ny = -dzdy;
      const nz = 1;

      const len = Math.sqrt(nx*nx + ny*ny + nz*nz);
      const n = { x: nx/len, y: ny/len, z: nz/len };

      // ★ brightness を強調（2.5倍）
      const brightness = Math.max(0, n.x*light.x + n.y*light.y + n.z*light.z) * 2.5;

      // ★ 影を濃く、ハイライトを明るく
      const rCol = 40 + brightness * 40;   // 濃い青 → 明るい水色
      const gCol = 80 + brightness * 80;
      const bCol = 160 + brightness * 95;

      const idx = (y * w + x) * 4;
      data[idx] = rCol;
      data[idx+1] = gCol;
      data[idx+2] = bCol;
      data[idx+3] = 255;
    }
  }

  ctx.putImageData(img, 0, 0);
  t += 1;
  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
