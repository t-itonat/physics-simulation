<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>斜め視点の円形波</title>
<style>
  body {
    margin: 0;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  canvas {
    border: 1px solid #444;
  }
</style>
</head>
<body>
<canvas id="canvas" width="600" height="400"></canvas>
<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const w = canvas.width;
const h = canvas.height;

const cx = w / 2;
const cy = h / 2 + 50; // 視点を下げると斜め感UP

const k = 0.08;
const omega = 0.08;
let t = 0;

function height(x, y, t) {
  const dx = x - cx;
  const dy = y - cy;
  const r = Math.sqrt(dx*dx + dy*dy);
  return Math.sin(k * r - omega * t);
}

function draw() {
  ctx.clearRect(0, 0, w, h);

  for (let y = 0; y < h; y += 2) {
    ctx.beginPath();
    for (let x = 0; x < w; x++) {
      const z = height(x, y, t);
      const y2 = y - z * 40; // ← 高さを画面に反映
      if (x === 0) ctx.moveTo(x, y2);
      else ctx.lineTo(x, y2);
    }
    ctx.strokeStyle = "rgba(100,150,255,0.6)";
    ctx.stroke();
  }

  t += 1;
  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
